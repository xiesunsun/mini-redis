name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4.2.2

      - name: 安装Go
        uses: actions/setup-go@v5.3.0
        with:
          go-version: "1.21"

      - name: 发布前检查
        run: |
          go build ./...
          go test ./...
          bash scripts/check_deps.sh

      - name: 构建跨平台二进制
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          outdir="dist/${VERSION}"
          mkdir -p "${outdir}"
          for target in \
            "darwin amd64" \
            "darwin arm64" \
            "linux amd64" \
            "linux arm64" \
            "windows amd64" \
            "windows arm64"; do
            os="${target%% *}"
            arch="${target##* }"
            name="mini-redis_${os}_${arch}"
            if [ "${os}" = "windows" ]; then
              name="${name}.exe"
            fi
            GOOS="${os}" GOARCH="${arch}" CGO_ENABLED=0 go build -o "${outdir}/${name}" ./cmd/server
          done

      - name: 生成校验文件
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd "dist/${VERSION}"
          sha256sum mini-redis_* > SHA256SUMS

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ github.ref_name }}/*
          generate_release_notes: true
