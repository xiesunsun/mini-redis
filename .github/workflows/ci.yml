name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4.2.2
      - name: 安装Go
        uses: actions/setup-go@v5.3.0
        with:
          go-version: "1.21"
      - name: 编译检查
        run: go build ./...
      - name: 依赖层级检查
        run: bash scripts/check_deps.sh